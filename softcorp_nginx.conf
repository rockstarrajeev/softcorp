server {
    listen 443 ssl;
    server_name wesoftcorp.com www.wesoftcorp.com;
    ssl_certificate /etc/letsencrypt/live/wesoftcorp.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/wesoftcorp.com/privkey.pem; # managed by Certbot

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    if ($host = www.wesoftcorp.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = wesoftcorp.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name wesoftcorp.com www.wesoftcorp.com;
    return 301 https://$host$request_uri;
}
